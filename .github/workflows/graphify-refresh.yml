name: graphify weekly refresh

# Once a week, rebuild the AST layer of the knowledge graph (code structure only,
# no LLM / no API key) and open a PR with the refreshed graph.json + GRAPH_REPORT.md.
# Keeps the committed map current with one PR per week instead of per-commit churn.
#
# PR mode (not direct push) because `main` is protected and requires pull requests.
# `main` needs only 0 approvals, so the PR merges in one click (or enable auto-merge).
#
# Semantic/doc layer is NOT refreshed here (that needs an LLM). Re-run the full
# `/graphify .` in Claude Code when docs change significantly.
#
# PREREQUISITE (one-time repo setting):
#   Settings → Actions → General → Workflow permissions:
#     • set "Read and write permissions"
#     • check "Allow GitHub Actions to create and approve pull requests"
#   Without these, the create-pull-request step fails.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: graphify-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: AST refresh (safe, no shrink)
        run: |
          count() { python3 -c "import json;print(len(json.load(open('graphify-out/graph.json'))['nodes']))" 2>/dev/null || echo 0; }
          BEFORE=$(count)
          uvx --from graphifyy graphify update . || echo "update returned non-zero (likely shrink-guard) — continuing"
          AFTER=$(count)
          echo "nodes: $BEFORE -> $AFTER"
          # Sanity guard: if the graph collapsed by >50%, revert and let a human investigate.
          if [ "$AFTER" -lt $((BEFORE / 2)) ]; then
            echo "::warning::node count dropped >50% ($BEFORE -> $AFTER); reverting"
            git checkout -- graphify-out/graph.json graphify-out/GRAPH_REPORT.md || true
          fi

      - name: Open/update refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            graphify-out/graph.json
            graphify-out/GRAPH_REPORT.md
          branch: graphify/weekly-refresh
          delete-branch: true
          commit-message: "chore(graphify): weekly AST refresh"
          title: "chore(graphify): weekly AST refresh"
          body: |
            Автоматический еженедельный рефреш AST-слоя графа знаний (структура кода, без LLM).

            Мерж — в один клик (требуется 0 апрувов). Если изменений нет — PR не создаётся.
