name: graphify blast radius

# On every PR, comment which graph nodes the changed code is connected to and
# flag touched "god nodes" (high-degree hubs). Reads the committed graph — no
# graphify install or rebuild needed. Pure-stdlib script, runs in seconds.
#
# Note: PRs opened from forks get a read-only token, so the comment step is
# skipped there. Branch-to-branch PRs inside the repo work normally.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: graphify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  blast-radius:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed files
        run: |
          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            > changed.txt
          echo "Changed files:"; cat changed.txt

      - name: Build impact comment
        id: impact
        run: |
          if [ ! -f graphify-out/graph.json ]; then
            echo "no graph.json committed — skipping"; echo "skip=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python3 .github/scripts/graphify_pr_impact.py changed.txt graphify-out/graph.json > impact.md
          cat impact.md

      - name: Upsert PR comment
        if: steps.impact.outputs.skip != '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('impact.md', 'utf8');
            const marker = '<!-- graphify-blast-radius -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
